name: Build macOS (Apple Silicon)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # If your package-lock.json is in the subfolder, tell the cache where to look
          cache-dependency-path: pancake-player/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        # Changed 'ci' to 'install' to bypass the lockfile error
        run: npm install
        working-directory: pancake-player

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: pancake-player
          args: --target aarch64-apple-darwin
          includeUpdaterJson: false

      - name: List bundle output
        run: find pancake-player/src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "Bundle dir not found"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: pancake-player-macos-arm
          path: pancake-player/src-tauri/target/aarch64-apple-darwin/release/bundle/
          retention-days: 14