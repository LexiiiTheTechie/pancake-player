name: Build macOS (Apple Silicon)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        # Since package-lock.json exists at the root, npm ci will now work
        run: npm ci

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Removed projectPath because everything is at the root
          args: --target aarch64-apple-darwin
          includeUpdaterJson: false

      - name: List bundle output (Debug)
        run: find src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "Bundle dir not found"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: pancake-player-macos-arm
          # Standard path relative to the root
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/
          retention-days: 14