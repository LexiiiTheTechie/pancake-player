name: Build macOS (Apple Silicon)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        # If package.json is also in the subfolder, add --prefix
        run: npm ci --prefix pancake-player

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This tells the action where your tauri.conf.json and src-tauri are
          projectPath: pancake-player
          args: --target aarch64-apple-darwin
          includeUpdaterJson: false

      - name: List bundle output
        # Updated path to include the subfolder for verification
        run: find pancake-player/src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "Bundle dir not found"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: pancake-player-macos-arm
          # Using the full relative path from the repo root
          path: pancake-player/src-tauri/target/aarch64-apple-darwin/release/bundle/
          retention-days: 14